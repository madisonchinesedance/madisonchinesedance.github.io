media: docs/assets/uploads

settings:
  content:
    merge: true

components:
  pageButtons:
    type: object
    list: true
    fields:
      - { name: label, label: Button text, type: string }
      - { name: href, hidden: true }
      - { name: route, hidden: true }
      - { name: style, hidden: true }
      - { name: ariaLabel, hidden: true }
      - { name: className, hidden: true }
      - { name: newTab, hidden: true }

  gridCards:
    type: object
    list:
      collapsible: true
      summary: "{heading}"
    fields:
      - { name: type, hidden: true }
      - { name: variant, hidden: true }
      - { name: heading, label: Card heading, type: string }
      - { name: body, label: Card text, type: text }
      - name: buttons
        label: Buttons
        component: pageButtons

  pageContent:
    type: block
    list: true
    blockKey: type
    description: "Do not delete Photo carousel or Embedded form blocks — they control galleries and ticket forms."
    blocks:
      - name: hero
        label: Page intro
        fields:
          - { name: heading, label: Heading, type: string, required: true }
          - { name: body, label: Content, type: text }
          - name: buttons
            label: Buttons
            component: pageButtons
      - name: text
        label: Section
        fields:
          - { name: heading, label: Heading, type: string }
          - { name: body, label: Content, type: text }
          - name: buttons
            label: Buttons
            component: pageButtons
      - name: grid
        label: Card grid
        fields:
          - { name: columns, label: Columns, type: number }
          - name: cards
            label: Cards
            component: gridCards
      - name: gallery
        label: Photo carousel (do not delete)
        fields:
          - { name: variant, hidden: true }
      - name: zeffy
        label: Embedded form (do not delete)
        fields:
          - { name: formUrl, hidden: true }
          - { name: iframeTitle, hidden: true }
          - { name: iframeSrc, hidden: true }

content:
  - name: site
    label: Site
    type: group
    items:
      - name: announcements
        label: Announcement bar
        type: file
        path: docs/content/announcements.json
        format: json
        fields:
          - name: announcements
            label: Announcements
            type: object
            list:
              collapsible: true
              summary: "{label}"
            fields:
              - { name: id, hidden: true }
              - { name: enabled, label: Show on site, type: boolean }
              - { name: label, label: Label, type: string }
              - { name: body, label: Message, type: text }
              - name: actions
                label: Buttons
                type: object
                list: true
                fields:
                  - { name: label, label: Button text, type: string }
                  - { name: route, hidden: true }
                  - { name: href, hidden: true }
                  - { name: style, hidden: true }
                  - { name: ariaLabel, hidden: true }

      - name: navigation
        label: Navigation
        type: file
        path: docs/content/header.json
        format: json
        description: "Edit menu link names only. Do not reorder or delete items."
        fields:
          - name: logo
            label: Site name
            type: object
            fields:
              - { name: text, label: Full name, type: string }
              - { name: shortText, label: Short name (mobile), type: string }
              - { name: route, hidden: true }
              - { name: ariaLabel, hidden: true }
          - { name: navigationLabel, hidden: true }
          - { name: menuToggleOpenLabel, hidden: true }
          - { name: menuToggleCloseLabel, hidden: true }
          - name: nav
            label: Menu
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{label}"
            fields:
              - { name: route, hidden: true }
              - { name: label, label: Menu label, type: string, required: true }
              - name: items
                label: Dropdown links
                type: object
                list:
                  collapsible: true
                  summary: "{label}"
                fields:
                  - { name: route, hidden: true }
                  - { name: label, label: Link name, type: string, required: true }
          - name: actions
            label: Header buttons
            type: object
            list: true
            fields:
              - { name: label, label: Button text, type: string }
              - { name: route, hidden: true }
              - { name: style, hidden: true }
              - { name: ariaLabel, hidden: true }

      - name: homepage
        label: Homepage
        type: file
        path: docs/content/index.json
        format: json
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: footer
        label: Footer
        type: file
        path: docs/content/footer.json
        format: json
        fields:
          - name: brand
            label: About
            type: object
            fields:
              - { name: mission, label: Mission statement, type: text }
              - { name: route, hidden: true }
              - { name: text, hidden: true }
              - { name: shortText, hidden: true }
          - name: operations
            label: Contact info
            type: object
            list: true
            fields:
              - { name: label, label: Display text, type: string }
              - { name: href, label: Link (optional), type: string }
          - { name: copyright, label: Copyright line, type: string }

  - name: pages
    label: Pages
    type: group
    items:
      - name: programs
        label: Programs
        type: file
        path: docs/content/programs.json
        format: json
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: classes
        label: Classes
        type: collection
        path: docs/content/classes
        format: json
        filename: "{primary}.json"
        view:
          fields: [pageTitle]
          primary: pageTitle
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: get-involved
        label: Get Involved
        type: collection
        path: docs/content/get-involved
        format: json
        filename: "{primary}.json"
        view:
          fields: [pageTitle]
          primary: pageTitle
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: events
        label: Events
        type: collection
        path: docs/content/events
        format: json
        filename: "{primary}.json"
        view:
          fields: [pageTitle]
          primary: pageTitle
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: tickets
        label: Tickets
        type: file
        path: docs/content/tickets.json
        format: json
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

      - name: donate
        label: Donate
        type: file
        path: docs/content/donate.json
        format: json
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Page content
            component: pageContent

  - name: archive
    label: Archive
    type: group
    items:
      - name: splendid-china
        label: Splendid China
        type: collection
        path: docs/content/splendid-china
        format: json
        filename: "{primary}.json"
        view:
          fields: [pageTitle]
          primary: pageTitle
          sort: [pageTitle]
          order: desc
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Event details
            component: pageContent

      - name: gallery
        label: Gallery
        type: file
        path: docs/content/gallery.json
        format: json
        fields:
          - { name: pageTitle, label: Page title, type: string, required: true }
          - { name: metaDescription, hidden: true }
          - name: content
            label: Intro text
            component: pageContent
