name: Scan Gallery Images from R2

on:
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI
  schedule:
    # Run weekly on Sundays at 6:00 AM UTC
    - cron: "0 6 * * 0"

permissions:
  contents: write

jobs:
  scan-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install boto3

      - name: Scan R2 bucket and update gallery JSON
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: python scripts/scan-images.py

      - name: Commit updated gallery files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/gallery.json content/splendid-china/
          git diff --staged --quiet || git commit -m "Update gallery images from R2 [automated]"
          git push