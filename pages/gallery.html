<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title data-json="pageTitle">Gallery | Madison Chinese Dance Academy</title>
	<meta name="description" content="Image gallery of the Madison Chinese Dance Academy." data-json="metaDescription" data-json-attr="content" />
	<link rel="stylesheet" href="/style.css" />
	<script defer src="/app.js"></script>
</head>
<body data-route="gallery">
	<a class="skip-link" href="#main">Skip to main content</a>

	<div data-site-header></div>

	<main id="main" tabindex="-1" class="site-main">
		<section class="page-hero" aria-labelledby="gallery-heading">
			<div class="container">
				<h1 id="gallery-heading" data-json="heading">Gallery</h1>
				<section class="gallery-section gallery-section-featured" data-gallery-featured aria-label="Featured gallery photos">
					<div class="gallery-container">
						<div class="gallery-wrapper" data-gallery-carousel></div>
						<div class="gallery-controls">
							<button class="prev" type="button" aria-label="Previous featured gallery image">&lt;</button>
							<button class="next" type="button" aria-label="Next featured gallery image">&gt;</button>
						</div>
					</div>
					<div class="gallery-dots" data-gallery-dots aria-label="Featured gallery image selection"></div>
					<div class="gallery-featured-thumbs" data-gallery-featured-thumbs aria-label="Featured gallery thumbnails"></div>
				</section>
				<section class="gallery-section gallery-section-archive" data-gallery-archive aria-label="Splendid China gallery photos">
					<div class="gallery-container">
						<div class="gallery-wrapper" data-gallery-carousel></div>
						<div class="gallery-controls">
							<button class="prev" type="button" aria-label="Previous gallery image">&lt;</button>
							<button class="next" type="button" aria-label="Next gallery image">&gt;</button>
						</div>
					</div>
					<div class="gallery-grid" data-gallery-grid aria-label="Gallery image thumbnails"></div>
				</section>
			</div>
		</section>
	</main>

	<div class="gallery-lightbox" data-gallery-lightbox hidden>
		<div class="gallery-lightbox-window" role="dialog" aria-modal="true" aria-label="Gallery image preview">
			<button class="gallery-lightbox-close" type="button" aria-label="Close gallery image preview">&times;</button>
			<img src="" alt="" data-gallery-lightbox-image>
		</div>
	</div>

	<div data-site-footer></div>
</body>
</html>
